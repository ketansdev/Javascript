<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2 id="form-heading">Login</h2>
        <form id="auth-form">

            <div class="input-group" id="name-group">
                <label for="name">Full Name</label>
                <input type="text" id="name">
                <div class="error-msg" id="name-error">Name is required</div>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email">
                <div class="error-msg" id="email-error">Enter a valid email</div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password">
                <div class="error-msg" id="password-error">Password must be atleast 6 letters</div>
            </div>

            <button id="submit-btn" type="submit">Login</button>
        </form>

        <div id="success-msg"></div>

        <div class="toggle">
            <span id="toggle-text">Don't have an account?</span>
            <span id="toggle-link">Sign Up</span>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
