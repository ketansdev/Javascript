<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>Multi-step Form</h2>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div class="step active">
            <label for="name">Full Name</label>
            <input type="text" id="name">
            <div class="error-msg" id="nameError">Name cannot be empty</div>
        </div>

        <div class="step">
            <label for="email">Email</label>
            <input type="email" id="email">
            <div class="error-msg" id="emailError">Enter a valid email</div>
        </div>

        <div class="step">
            <label for="password">Password</label>
            <input type="password" id="password">
            <div class="error-msg" id="passwordError">Password should has more than 6 charachters</div>
        </div>


        <div class="btn-container">
            <button type="submit" id="prev-btn">Previous</button>
            <button type="submit" id="next-btn">Next</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
