<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 10 - Like Dislike Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Like / Dislike System</h1>
        <div class="btn-container">
            <button id="like-btn">👍 Like</button>
            <button id="dislike-btn">👎 Dislike</button>
        </div>
        <div class="update-counter">
            <p>Likes : <span class="like-count">0</span></p>
            <p>Dislikes : <span  class="dislike-count">0</span></p>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
