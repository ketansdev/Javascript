<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 14 - Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Shopping Cart</h1>
        <div class="products">
            <div class="product">
                <span>Product A - ₹500</span>
                <button data-price = "500">Add</button>
            </div>
            <div class="product">
                <span>Product A - ₹300</span>
                <button data-price = "300">Add</button>
            </div>
            <div class="product">
                <span>Product A - ₹200</span>
                <button data-price = "200">Add</button>
            </div>
        </div>
        <h2>Your Cart</h2>
        <div class="cart"></div>
        <h3>Total: ₹<span id = "total-price">0</span></h3>

    </div>



    <script src="./script.js"></script>
</body>
</html>
