<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - Github Profile Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <!-- Top bar -->
        <div class="top-bar">
            <div class="nav-logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577v-2.165c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.929.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.63-5.37-12-12-12z" />
                </svg>
                <span>Github Explorer</span>
            </div>
            <div class="top-right-text">
                <span>// dev profile search</span>
            </div>
        </div>

        <!-- Navbar Main -->
        <nav>
            <div class="nav-buttons">
                <button id="home-screen-btn">Home Screen</button>
                <button id="profile-screen-btn">Profile Screen</button>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="hero-content">
                <p>discover developers &middot; explore projects &middot; find inspiration</p>
                <h1>Search Github <span>Developers</span></h1>
                <div class="search">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <div>
 <input type="text" placeholder="Enter Github username..." id="search-input">
                    <button>Search</button>
                    </div>
                   


                </div>
            </div>
        </section>

        <section class="main-section default-profiles">
            <div class="header-main-section">
                <span>- Top Devlopers</span>
                <span>30 Devlopers</span>
            </div>
            <div class="main-developer-profiles"></div>
        </section>

        <section class="searched-profiles"></section>
    </main>
    <footer>
        <p>Built with GitHub API</p>
        <a href="https://api.github.com/users">api.github.com</a>
    </footer>
    <script src="./script.js"></script>
</body>

</html>
