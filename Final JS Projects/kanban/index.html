<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <nav class="nav">
            <div class="nav-left nav-items">
                <h1>KanbanFlow</h1>
            </div>
            <div class="nav-center nav-items">
                <input type="text" placeholder="Search by heading..." id="search-bar">
            </div>
            <div class="nav-right nav-items">
                <button id="add-task-btn"><span>Add Task</span>
  +</button>
            </div>
        </nav>

        <div id="modal-overlay" class="modal-overlay">
           
        </div>

        <section class="board">
            <div class="column" id="backlog">
                <nav>
                    <span>Backlog</span>
                    <span class="count">Count</span>
                </nav>
                <div class="task-column"></div>
            </div>
            <div class="column" id="progress">
                <nav>
                    <span>In Progress</span>
                    <span class="count">Count</span>
                </nav>
                <div class="task-column"></div>
            </div>
            <div class="column" id="done">
                <nav>
                    <span>Done</span>
                    <span class="count">Count</span>
                </nav>
                <div class="task-column"></div>
            </div>
            <div id="toast"></div>

        </section>
    </main>
    <script src="./script.js"></script>
</body>

</html>
